<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PupManager</title>
    <style>
      :root {
        color-scheme: light;
        /* PupManager brand palette — kept in sync with src/app/globals.css */
        --bg-from: #effcfd;
        --bg-to:   #ffffff;
        --fg:      #0f3a3f;
        --muted:   #4a6c70;
        --brand-50:  #effcfd;
        --brand-500: #4ab1bd;
        --brand-600: #2a9da9;
        --brand-700: #1f818c;
        --brand-800: #0f5d68;
        --accent:    #f4a261; /* warm amber sticker accent */
        --border:    #d6eef0;
      }
      html, body {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        background:
          radial-gradient(120% 80% at 50% 0%, var(--bg-from) 0%, transparent 60%),
          radial-gradient(140% 90% at 50% 100%, #fdf3e6 0%, transparent 70%),
          var(--bg-to);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: max(2rem, env(safe-area-inset-top)) 2rem max(2rem, env(safe-area-inset-bottom));
      }
      .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        max-width: 22rem;
        animation: fade-in 0.45s ease both;
      }
      .mark {
        width: 92px;
        height: 92px;
        border-radius: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, var(--brand-500) 0%, var(--brand-700) 100%);
        box-shadow:
          0 18px 40px -16px rgba(31, 129, 140, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        position: relative;
        animation: float 4s ease-in-out infinite;
      }
      .mark img { width: 92px; height: 92px; border-radius: 26px; display: block; }
      .mark::after {
        /* warm amber sticker poking out, FM-style pop-out composition */
        content: '';
        position: absolute;
        bottom: -10px;
        right: -10px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 6px 14px -4px rgba(244, 162, 97, 0.55);
        border: 3px solid #ffffff;
      }
      .wordmark {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--brand-800);
        margin: 0;
        font-feature-settings: 'ss01' on;
      }
      .wordmark .pup { color: var(--brand-700); }
      .tagline {
        font-size: 0.95rem;
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      h1 { font-size: 1.35rem; margin: 0; font-weight: 700; color: var(--brand-800); }

      /* Three-dot pulse, paced like a heartbeat */
      .dots {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 0.25rem;
      }
      .dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--brand-500);
        animation: bounce 1.05s ease-in-out infinite;
      }
      .dots span:nth-child(2) { animation-delay: 0.15s; background: var(--brand-600); }
      .dots span:nth-child(3) { animation-delay: 0.3s;  background: var(--brand-700); }

      button {
        appearance: none;
        background: linear-gradient(160deg, var(--brand-500) 0%, var(--brand-700) 100%);
        color: white;
        border: none;
        border-radius: 14px;
        padding: 0.95rem 1.75rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        min-width: 11rem;
        margin-top: 0.5rem;
        box-shadow: 0 10px 25px -10px rgba(31, 129, 140, 0.55);
        transition: transform 0.12s ease, box-shadow 0.2s ease;
      }
      button:active { transform: translateY(1px); box-shadow: 0 6px 14px -8px rgba(31, 129, 140, 0.55); }
      button:disabled { opacity: 0.5; cursor: default; }

      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.55; }
        40% { transform: translateY(-8px); opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div id="loading" class="stack">
      <span class="mark" aria-hidden="true">
        <img src="icon.png" alt="" />
      </span>
      <div>
        <p class="wordmark"><span class="pup">Pup</span>Manager</p>
        <p class="tagline" style="margin-top: 0.35rem;">Fetching your pack…</p>
      </div>
      <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>

    <div id="offline" class="stack" hidden>
      <span class="mark" aria-hidden="true">
        <img src="icon.png" alt="" />
      </span>
      <div>
        <h1>Looks like you&rsquo;re offline</h1>
        <p class="tagline" style="margin-top: 0.5rem;">We&rsquo;ll keep sniffing for a connection — tap retry once you&rsquo;re back online.</p>
      </div>
      <button id="retry" type="button">Try again</button>
    </div>

    <script>
      var REMOTE_URL = 'https://app.pupmanager.com';
      var loading = document.getElementById('loading');
      var offline = document.getElementById('offline');
      var retry = document.getElementById('retry');
      var retrying = false;

      function showOffline() {
        loading.hidden = true;
        offline.hidden = false;
      }
      function showLoading() {
        offline.hidden = true;
        loading.hidden = false;
      }

      function tryLoad() {
        if (retrying) return;
        retrying = true;
        var controller = new AbortController();
        var timeout = setTimeout(function () { controller.abort(); }, 5000);
        fetch(REMOTE_URL + '/manifest.json', {
          method: 'GET',
          mode: 'no-cors',
          cache: 'no-store',
          signal: controller.signal,
        }).then(function () {
          clearTimeout(timeout);
          window.location.replace(REMOTE_URL);
        }).catch(function () {
          clearTimeout(timeout);
          retrying = false;
          showOffline();
        });
      }

      retry.addEventListener('click', function () {
        showLoading();
        tryLoad();
      });

      tryLoad();
      window.addEventListener('online', function () {
        if (!offline.hidden) {
          showLoading();
          tryLoad();
        }
      });
      setInterval(function () {
        if (!offline.hidden) tryLoad();
      }, 5000);
    </script>
  </body>
</html>
