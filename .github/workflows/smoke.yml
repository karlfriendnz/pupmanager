name: Smoke

on:
  push:
    branches: [main]
  pull_request:

# Only run the latest commit's smoke tests for any branch — superseded runs
# get cancelled to save minutes.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Smoke tests don't talk to the real DB. We point Prisma at a local SQLite
    # URL solely so `prisma generate` runs cleanly during install — the tests
    # themselves never query the DB.
    env:
      DATABASE_URL: file:./test.db
      DIRECT_URL: file:./test.db
      AUTH_SECRET: ci-only-not-real-secret-needs-16-chars
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      CRON_SECRET: ci-only-not-real-secret-needs-16-chars
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # No postinstall hook generates it, so without this every request dies on
      # "Cannot find module '@/generated/prisma'" and the web server never comes
      # up. Same step the Tests workflow already has.
      - run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
